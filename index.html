<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <title>Hello World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      transition: background 0.5s ease;
      cursor: pointer;
      font-family: system-ui, sans-serif;
      gap: 20px;
      padding: 40px;
    }
    h1 {
      color: white;
      font-size: 4rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
      user-select: none;
    }
    #links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      max-width: 600px;
    }
    #links a {
      color: white;
      text-decoration: none;
      background: rgba(255,255,255,0.2);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 1.1rem;
      transition: background 0.2s;
      user-select: none;
    }
    #links a:hover {
      background: rgba(255,255,255,0.35);
    }
  </style>
</head>
<body>
  <h1>Hello World</h1>
  <div id="links">
    <a href="balls.html">Ball Pit Simulator</a>
    <a href="shoot.html">Slingshot 3D</a>
    <a href="marble.html">Marble Machine 2D</a>
  </div>
  <script>
    const gradients = [
      ['#667eea', '#764ba2'],
      ['#f093fb', '#f5576c'],
      ['#4facfe', '#00f2fe'],
      ['#43e97b', '#38f9d7'],
      ['#fa709a', '#fee140'],
      ['#a18cd1', '#fbc2eb'],
      ['#fccb90', '#d57eeb'],
      ['#e0c3fc', '#8ec5fc'],
      ['#f5576c', '#ff9a9e'],
      ['#667eea', '#764ba2'],
    ];
    let index = 0;
    document.body.addEventListener('click', (e) => {
      if (e.target.tagName === 'A') return;
      index = (index + 1) % gradients.length;
      const [c1, c2] = gradients[index];
      document.body.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
    });
  </script>
</body>
</html>
