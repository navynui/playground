<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Sandbox</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            font-family: sans-serif;
        }
        canvas {
            display: block;
        }
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            font-family: sans-serif;
        }
        canvas {
            display: block;
        }
        /* Container for top-left stats (Particle count, velocity) */
        #stats-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            user-select: none;
        }
        /* Container for top-right home link */
        #home-link-container {
            position: absolute;
            top: 10px;
            right: 10px; /* Positioned on the right side */
        }
        .controls button, .controls a { /* Shared styling for buttons/links in controls div */
            pointer-events: auto;
            cursor: pointer;
            padding: 8px 12px;
            background: #444;
            color: white;
            border: none;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .controls button:hover, .controls a:hover {
            background: #666;
        }
        #ui-overlay div {
            margin-bottom: 5px;
        }
        /* Parameter Panel Styling */
        #settings-panel {
            position: absolute;
            top: 60px;
            right: 10px;
            width: 250px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
            z-index: 100;
        }
        .param-group {
            margin-bottom: 15px;
        }
        .param-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #aaa;
        }
        .control-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .control-row input[type="range"] {
            flex: 1;
            cursor: pointer;
        }
        .control-row input[type="number"] {
            width: 60px;
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 4px;
            border-radius: 4px;
        }
        #save-btn {
            width: 100%;
            margin-top: 10px;
            background: #28a745;
        }
        #save-btn:hover {
            background: #218838;
        }
    </style>
</head>
<body>

<div id="stats-overlay">
    <div>Particles: <span id="count">0</span></div>
    <div>Avg Velocity: <span id="avg-vel">0</span></div>
    <div class="controls">
        <button id="reset-btn">Reset</button>
    </div>
</div>

<div id="home-link-container">
    <button id="home-link-btn" class="control-btn" onclick="window.location.href='index.html'">Home</button>
</div>

<div id="settings-panel">
    <div class="param-group">
        <label>Gravity Strength</label>
        <div class="control-row">
            <input type="range" id="gravityStrength-slider" min="0" max="5000" step="100">
            <input type="number" id="gravityStrength-num">
        </div>
    </div>
    <div class="param-group">
        <label>Gravity Well Radius</label>
        <div class="control-row">
            <input type="range" id="gravityRadius-slider" min="10" max="500" step="10">
            <input type="number" id="gravityRadius-num">
        </div>
    </div>
    <div class="param-group">
        <label>Friction (Bounciness)</label>
        <div class="control-row">
            <input type="range" id="friction-slider" min="0" max="1" step="0.05">
            <input type="number" id="friction-num" step="0.05">
        </div>
    </div>
    <div class="param-group">
        <label>Air Damping</label>
        <div class="control-row">
            <input type="range" id="airDamping-slider" min="0.9" max="1" step="0.001">
            <input type="number" id="airDamping-num" step="0.001">
        </div>
    </div>
    <div class="param-group">
        <label>Particle Size</label>
        <div class="control-row">
            <input type="range" id="particleSize-slider" min="1" max="20" step="0.5">
            <input type="number" id="particleSize-num" step="0.5">
        </div>
    </div>
    <button id="save-btn" class="control-btn">Save Settings</button>
</div>

<canvas id="sandbox"></canvas>

<script>
    const canvas = document.getElementById('sandbox');
    const ctx = canvas.getContext('2d');
    const countEl = document.getElementById('count');
    const avgVelEl = document.getElementById('avg-vel');
    const resetBtn = document.getElementById('reset-btn');

    let particles = [];
    
    // Configurable Parameters (Default values)
    let settings = {
        particleCount: 50,
        friction: 0.8,
        gravityStrength: 1000,
        gravityRadius: 150,
        airDamping: 0.995,
        particleSize: 3,
        connectionDist: 100
    };

    let mouse = { x: -1000, y: -1000, active: false };

    // DOM Elements for controls
    const controls = {
        gravityStrength: { slider: document.getElementById('gravityStrength-slider'), num: document.getElementById('gravityStrength-num') },
        gravityRadius: { slider: document.getElementById('gravityRadius-slider'), num: document.getElementById('gravityRadius-num') },
        friction: { slider: document.getElementById('friction-slider'), num: document.getElementById('friction-num') },
        airDamping: { slider: document.getElementById('airDamping-slider'), num: document.getElementById('airDamping-num') },
        particleSize: { slider: document.getElementById('particleSize-slider'), num: document.getElementById('particleSize-num') },
        saveBtn: document.getElementById('save-btn')
    };

    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 2;
            this.vy = (Math.random() - 0.5) * 2;
            this.updateRadius();
        }

        updateRadius() {
            this.radius = settings.particleSize + Math.random() * settings.particleSize;
        }

        update() {
            // Apply Gravity Well logic
            if (mouse.active) {
                /**
                 * Vector Math for Gravity Pull:
                 * 1. Calculate the displacement vector from particle to mouse: (dx, dy)
                 * 2. Calculate distance squared (distSq = dx^2 + dy^s) to implement Inverse Square Law
                 * 3. Force magnitude is proportional to 1 / distSq
                 * 4. Acceleration direction is along the normalized displacement vector
                 */
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const distSq = dx * dx + dy * dy;
                const dist = Math.sqrt(distSq);

                if (dist > 1) { // Avoid division by zero/extreme forces
                    const force = settings.gravityStrength / distSq;
                    this.vx += (dx / dist) * force;
                    this.vy += (dy / dist) * force;
                }
            }

            // Movement
            this.x += this.vx;
            this.y += this.vy;

            // Boundary Collision with Friction
            if (this.x - this.radius < 0) {
                this.x = this.radius;
                this.vx *= -settings.friction;
            } else if (this.x + this.radius > canvas.width) {
                this.x = canvas.width - this.radius;
                this.vx *= -settings.friction;
            }

            if (this.y - this.radius < 0) {
                this.y = this.radius;
                this.vy *= -settings.friction;
            } else if (this.y + this.radius > canvas.height) {
                this.y = canvas.height - this.radius;
                this.vy *= -settings.friction;
            }

            // Slow down particles naturally to prevent infinite acceleration
            this.vx *= settings.airDamping;
            this.vy *= settings.airDamping;
        }

        draw() {
            const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
            // Map speed (approx 0 to 10) to hue (240 for blue, 0 for red)
            const hue = Math.max(0, 240 * (1 - speed / 10));
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
            ctx.fill();
        }
    }

    function init() {
        particles = [];
        for (let i = 0; i < settings.particleCount; i++) {
            particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height));
        }
        countEl.textContent = particles.length;
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Gravity Well Indicator
        if (mouse.active) {
            const gradient = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, settings.gravityRadius);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.15)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, settings.gravityRadius, 0, Math.PI * 2);
            ctx.fill();
        }

        let totalVel = 0;

        // Draw Connections (Constellation effect)
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < settings.connectionDist) {
                    // Calculate hue for both based on speed
                    const speedI = Math.sqrt(particles[i].vx ** 2 + particles[i].vy ** 2);
                    const hueI = Math.max(0, 240 * (1 - speedI / 10));
                    const speedJ = Math.sqrt(particles[j].vx ** 2 + particles[j].vy ** 2);
                    const hueJ = Math.max(0, 240 * (1 - speedJ / 10));
                    
                    const avgHue = (hueI + hueJ) / 2;

                    ctx.beginPath();
                    ctx.lineWidth = 1;
                    // Opacity increases as distance decreases
                    ctx.strokeStyle = `hsla(${avgHue}, 100%, 50%, ${1 - dist / settings.connectionDist})`;
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.stroke();
                }
            }
        }

        // Update and Draw Particles
        particles.forEach(p => {
            p.update();
            p.draw();
            totalVel += Math.sqrt(p.vx * p.vx + p.vy * p.vy);
        });

        avgVelEl.textContent = (totalVel / particles.length).toFixed(2);

        requestAnimationFrame(animate);
    }

    // Event Listeners
    window.addEventListener('resize', resize);
    
    canvas.addEventListener('mousedown', (e) => {
        mouse.active = true;
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    window.addEventListener('mouseup', () => {
        mouse.active = false;
    });

    canvas.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    resetBtn.addEventListener('click', init);

    // Settings Management
    function updateUI() {
        for (const key in controls) {
            if (controls[key].slider) {
                controls[key].slider.value = settings[key];
                controls[key].num.value = settings[key];
            }
        }
    }

    function syncControls(key, source) {
        const val = parseFloat(source.value);
        settings[key] = val;
        
        if (source === controls[key].slider) {
            controls[key].num.value = val;
        } else {
            controls[key].slider.value = val;
        }

        // Handle specific logic for certain settings
        if (key === 'particleSize') {
            particles.forEach(p => p.updateRadius());
        }
    }

    function saveSettings() {
        localStorage.setItem('gravityWellSettings', JSON.stringify(settings));
        const originalText = controls.saveBtn.textContent;
        controls.saveBtn.textContent = 'Saved!';
        controls.saveBtn.style.background = '#1e7e34';
        setTimeout(() => {
            controls.saveBtn.textContent = originalText;
            controls.saveBtn.style.background = '';
        }, 1500);
    }

    function loadSettings() {
        const saved = localStorage.getItem('gravityWellSettings');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                settings = { ...settings, ...parsed };
                updateUI();
            } catch (e) {
                console.error("Error loading settings", e);
            }
        }
    }

    // Attach listeners to all sliders and number inputs
    for (const key in controls) {
        if (controls[key].slider) {
            controls[key].slider.addEventListener('input', () => syncControls(key, controls[key].slider));
            controls[key].num.addEventListener('input', () => syncControls(key, controls[key].num));
        }
    }

    controls.saveBtn.addEventListener('click', saveSettings);

    // Start
    resize();
    loadSettings();
    updateUI();
    init();
    animate();

</script>
</body>
</html>
