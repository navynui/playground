<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" href="icon.svg" type="image/svg+xml" />
        <title>Mechanical Linkage Sim</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #1a1a2e;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                align-items: center;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                color: #eee;
            }
            canvas {
                display: block;
                cursor: crosshair;
            }
            #home-link {
                position: fixed;
                top: 16px;
                right: 16px;
                color: #eee;
                text-decoration: none;
                font-size: 14px;
                background: rgba(0, 0, 0, 0.5);
                padding: 8px 14px;
                border-radius: 8px;
                transition: background 0.2s;
                z-index: 100;
            }
            #home-link:hover {
                background: rgba(0, 0, 0, 0.7);
            }
            #toolbar {
                position: fixed;
                top: 16px;
                left: 16px;
                display: flex;
                flex-direction: row;
                flex-wrap: wrap;
                align-items: flex-start;
                gap: 10px;
                z-index: 100;
                max-width: calc(100vw - 100px);
                pointer-events: none;
            }
            .panel {
                pointer-events: auto;
                background: rgba(22, 33, 62, 0.9);
                padding: 12px;
                border-radius: 8px;
                border: 1px solid #4e4e6a;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            }
            .panel h3 {
                font-size: 14px;
                margin-bottom: 8px;
                color: #f5a623;
                text-transform: uppercase;
                letter-spacing: 1px;
            }
            .btn-group {
                display: flex;
                gap: 5px;
                flex-wrap: wrap;
            }
            button {
                background: #0f3460;
                color: white;
                border: none;
                padding: 6px 12px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 13px;
                transition: background 0.2s;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 4px;
                vertical-align: middle;
            }
            button:hover {
                background: #16213e;
            }
            button.active {
                background: #e94560;
            }

            #inspector {
                position: fixed;
                bottom: 16px;
                left: 16px;
                width: 240px;
                display: none;
            }
            .control-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin: 8px 0;
                font-size: 12px;
            }
            input[type="range"] {
                width: 100px;
                accent-color: #e94560;
            }
            input[type="number"] {
                width: 50px;
                background: #16213e;
                border: 1px solid #4e4e6a;
                color: white;
                padding: 2px;
            }
            .hint {
                position: fixed;
                bottom: 16px;
                right: 16px;
                font-size: 12px;
                color: rgba(255, 255, 255, 0.5);
                pointer-events: none;
            }
        </style>
    </head>
    <body>
        <a id="home-link" href="index.html">Home</a>

        <div id="toolbar">
            <div class="panel">
                <h3>Add Components</h3>
                <div class="btn-group">
                    <button id="addCrankBtn">Add Crank</button>
                    <button id="addJointBtn">Add Joint</button>
                    <button id="addLinkBtn">Add Linkage</button>
                    <button id="jansenBtn" style="background: #6a5acd">
                        Jansen
                    </button>
                </div>
            </div>
            <div class="panel">
                <h3>Control</h3>
                <div class="btn-group">
                    <button
                        id="playPauseBtn"
                        style="background: #553"
                        title="Play/Pause"
                    >
                        <svg
                            id="pauseIcon"
                            width="14"
                            height="14"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <rect x="6" y="4" width="4" height="16"></rect>
                            <rect x="14" y="4" width="4" height="16"></rect>
                        </svg>
                        <svg
                            id="playIcon"
                            width="14"
                            height="14"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"

                    </button>
                    <button

                        Save State
                    </button>
                    <button
                        id="exportBtn"
                        style="background: #353"

                    >
                        <svg
                            width="14"
                            height="14"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >

                                d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"
                            />

                    <button
                        id="importBtn"

                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"

                            <line x1="12" y1="3" x2="12" y2="15" />

                    <button id="clearTracesBtn" style="background: #335">

                </div>

            <div class="panel">
                <h3>Edit</h3>
                <div class="btn-group">

                    </button>
                    <button id="copyBtn">Copy</button>

                    <button id="mirrorHBtn" title="Mirror Horizontal">

                            <path d="m18 8 4 4-4 4" />
                            <path d="M22 12H12" />
                            <path d="m6 8-4 4 4 4" />

                    <button id="mirrorVBtn" title="Mirror Vertical">

                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"

                            <path d="M2 12h20" />
                            <path d="m16 18-4 4-4-4" />
                            <path d="M12 22V12" />
                            <path d="m16 6-4-4-4 4" />

                    <button id="rotateLBtn" title="Rotate Left">
                        <svg

                            height="14"

                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"

                            <path

                    </button>
                    <button id="rotateRBtn" title="Rotate Right">
                        <svg
                            width="14"
                            height="14"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path
                                d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"

                    <input

                        id="linkColorPicker"

                        value="#4facfe"
                        style="

                            height: 28px;
                            width: 28px;
                            cursor: pointer;

                        "

        <div id="inspector" class="panel">
            <h3 id="inspectTitle">Inspector</h3>
            <div id="crankControls">

                    <label>RPM</label>
                    <div style="display: flex; gap: 5px; align-items: center">
                        <input
                            type="range"
                            id="crankRPM"
                            min="-120"
                            max="120"
                            step="0.1"
                            value="30"
                        />
                        <input
                            type="number"
                            id="crankRPMNum"
                            step="0.1"
                            value="30"
                        />
                    </div>
                </div>
                <div class="control-row">
                    <label>Angle (deg)</label>
                    <div style="display: flex; gap: 5px; align-items: center">
                        <input
                            type="range"
                            id="crankAngle"
                            min="0"
                            max="360"
                            step="1"
                            value="0"
                        />
                        <input
                            type="number"
                            id="crankAngleNum"
                            min="0"
                            max="360"
                            step="1"
                            value="0"
                        />
                    </div>
                </div>
                <div class="control-row">
                    <label>Arm (cm)</label>
                    <div style="display: flex; gap: 5px; align-items: center">
                        <input
                            type="range"
                            id="crankLen"
                            min="10"
                            max="200"
                            step="0.1"
                            value="50"
                        />
                        <input
                            type="number"
                            id="crankLenNum"
                            step="0.1"
                            value="50"
                        />
                    </div>
                </div>
                <div class="control-row">
                    <label>Quick Start</label>
                    <div class="btn-group" style="justify-content: flex-end">
                        <button id="crankStop" style="background: #e94560">Stop</button>
                        <button id="crankCW" title="Clockwise">CW</button>
                        <button id="crankCCW" title="Counter-Clockwise">CCW</button>
                    </div>
                </div>
            </div>
            <div id="linkageControls">
                <div class="control-row">
                    <label>Length (cm)</label>
                    <div style="display: flex; gap: 5px; align-items: center">
                        <input
                            type="range"
                            id="linkLen"
                            min="20"
                            max="500"
                            step="0.1"
                            value="150"
                        />
                        <input
                            type="number"
                            id="linkLenNum"
                            step="0.1"
                            value="150"

            </div>
            <div id="jointControls">
                <div class="control-row">
                    <label>X Position</label>
                    <input type="number" id="jointX" step="0.1" />
                </div>
                <div class="control-row">
                    <label>Y Position</label>

                </div>
                <div class="control-row">

                <div class="control-row">

                </div>
                <div class="control-row">

                    <select id="jointConstraint">
                        <option value="none">None</option>

            <button

        <div class="hint">
            Drag joints to move • Arrow keys to nudge • Shift+Click to select •
            Ctrl+Z Undo • Ctrl+C/V Copy/Paste
        </div>

        <canvas id="canvas"></canvas>

        <script>
            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const CM_TO_PX = 2;
            let joints = [];
            let links = [];
            let isPaused = false;
            let selectedIds = new Set();
            let selectedType = null; // 'joint', 'link'
            let clipboard = null;
            let undoStack = [];
            let marqueeActive = false;
            let marqueeStart = { x: 0, y: 0 };
            let draggingJoint = null;
            let mode = "select";
            let tempLinkStart = null;
            let moveUndoPushed = false;

            class Joint {
                constructor(x, y, fixed = false) {
                    this.x = x;
                    this.y = y;
                    this.fixed = fixed;
                    this.constraint = "none";
                    this.startX = x;
                    this.startY = y;
                    this.trace = false;
                    this.path = [];
                    this.id = Math.random().toString(36).substr(2, 9);
                }
            }

            class Link {
                constructor(a, b, length, isCrank = false) {
                    this.a = a;
                    this.b = b;
                    this.length = length;
                    this.isCrank = isCrank;
                    this.rpm = 30;
                    this.angle = 0;
                    this.color = isCrank ? "#f5a623" : "#4facfe";
                    this.id = Math.random().toString(36).substr(2, 9);
                }
            }

            function pushUndo() {
                const state = JSON.stringify({
                    joints: joints.map((j) => ({
                        x: j.x,
                        y: j.y,
                        fixed: j.fixed,
                        constraint: j.constraint,
                        startX: j.startX,
                        startY: j.startY,
                        trace: j.trace,
                        id: j.id,
                    })),
                    links: links.map((l) => ({
                        aId: l.a.id,
                        bId: l.b.id,
                        length: l.length,
                        isCrank: l.isCrank,
                        rpm: l.rpm,
                        angle: l.angle,
                        color: l.color,
                        id: l.id,
                    })),
                    selectedIds: Array.from(selectedIds),
                    selectedType: selectedType,
                });
                undoStack.push(state);
                if (undoStack.length > 50) undoStack.shift();
            }

            function undo() {
                if (undoStack.length === 0) return;
                const state = JSON.parse(undoStack.pop());
                joints = state.joints.map((sj) => {
                    const j = new Joint(sj.x, sj.y, sj.fixed);
                    j.id = sj.id;
                    j.constraint = sj.constraint;
                    j.startX = sj.startX;
                    j.startY = sj.startY;
                    j.trace = sj.trace;
                    return j;
                });
                links = state.links
                    .map((sl) => {
                        const ja = joints.find((j) => j.id === sl.aId);
                        const jb = joints.find((j) => j.id === sl.bId);
                        if (!ja || !jb) return null;
                        const l = new Link(ja, jb, sl.length, sl.isCrank);
                        l.rpm = sl.rpm;
                        l.angle = sl.angle;
                        if (sl.color) l.color = sl.color;
                        l.id = sl.id;
                        return l;
                    })
                    .filter((l) => l !== null);
                selectedIds = new Set(state.selectedIds);
                selectedType = state.selectedType;
                selectObject(selectedType, null, true);
            }

            function init() {
                if (loadState()) return;
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                const j1 = new Joint(cx, cy, true);
                const j2 = new Joint(cx + 50 * CM_TO_PX, cy, false);
                joints.push(j1, j2);
                links.push(new Link(j1, j2, 50 * CM_TO_PX, true));
            }

            function saveState() {
                const state = {
                    joints: joints.map((j) => ({
                        x: j.x,
                        y: j.y,
                        fixed: j.fixed,
                        constraint: j.constraint,
                        startX: j.startX,
                        startY: j.startY,
                        trace: j.trace,
                        id: j.id,
                    })),
                    links: links.map((l) => ({
                        aId: l.a.id,
                        bId: l.b.id,
                        length: l.length,
                        isCrank: l.isCrank,
                        rpm: 0,
                        angle: l.angle,
                        color: l.color,
                        id: l.id,
                    })),
                };
                localStorage.setItem(
                    "mechanics_sim_state",
                    JSON.stringify(state),
                );
            }

            function loadState() {
                const saved = localStorage.getItem("mechanics_sim_state");
                if (!saved) return false;
                try {
                    const state = JSON.parse(saved);
                    joints = state.joints.map((sj) => {
                        const j = new Joint(sj.x, sj.y, sj.fixed);
                        j.id = sj.id;
                        j.constraint = sj.constraint || "none";
                        j.startX = sj.startX ?? sj.x;
                        j.startY = sj.startY ?? sj.y;
                        j.trace = sj.trace;
                        return j;
                    });
                    links = state.links
                        .map((sl) => {
                            const ja = joints.find((j) => j.id === sl.aId);
                            const jb = joints.find((j) => j.id === sl.bId);
                            if (!ja || !jb) return null;
                            const l = new Link(ja, jb, sl.length, sl.isCrank);
                            l.rpm = sl.rpm;
                            l.angle = sl.angle;
                            if (sl.color) l.color = sl.color;
                            l.id = sl.id;
                            return l;
                        })
                        .filter((l) => l !== null);
                    return true;
                } catch (e) {
                    return false;
                }
            }

            function intersectCircles(x1, y1, r1, x2, y2, r2, sign = 1) {
                const d = getDist(x1, y1, x2, y2);
                if (d > r1 + r2 || d < Math.abs(r1 - r2))
                    return { x: x1, y: y1 };
                const a = (r1 ** 2 - r2 ** 2 + d ** 2) / (2 * d);
                const h = Math.sqrt(Math.max(0, r1 ** 2 - a ** 2));
                const x0 = x1 + (a * (x2 - x1)) / d;
                const y0 = y1 + (a * (y2 - y1)) / d;
                return {
                    x: x0 + (sign * h * (y2 - y1)) / d,
                    y: y0 - (sign * h * (x2 - x1)) / d,
                };
            }

            function getDist(x1, y1, x2, y2) {
                return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
            }

            function update() {
                joints.forEach((j) => (j.isDriven = false));

                links.forEach((l) => {
                    if (l.isCrank) {
                        if (!isPaused) {
                            const rps = l.rpm / 60;
                            const deltaTheta = (rps * 2 * Math.PI) / 60;
                            l.angle += deltaTheta;
                        }
                        l.b.x = l.a.x + Math.cos(l.angle) * l.length;
                        l.b.y = l.a.y + Math.sin(l.angle) * l.length;
                        l.a.isDriven = true;
                        l.b.isDriven = true;
                    }
                });

                for (let i = 0; i < 10; i++) {
                    links.forEach((l) => {
                        if (l.isCrank) return;
                        const dx = l.b.x - l.a.x;
                        const dy = l.b.y - l.a.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const diff = (l.length - dist) / (dist || 1);

                        const aFixed = l.a.fixed || l.a.isDriven;
                        const bFixed = l.b.fixed || l.b.isDriven;

                        if (aFixed && bFixed) return;

                        if (aFixed) {
                            l.b.x += dx * diff;
                            l.b.y += dy * diff;
                        } else if (bFixed) {
                            l.a.x -= dx * diff;
                            l.a.y -= dy * diff;
                        } else {
                            const offsetX = dx * diff * 0.5;
                            const offsetY = dy * diff * 0.5;
                            l.a.x -= offsetX;
                            l.a.y -= offsetY;
                            l.b.x += offsetX;
                            l.b.y += offsetY;
                        }
                    });
                    joints.forEach((j) => {
                        if (j.fixed || j.isDriven) return;
                        if (j.constraint === "x") j.x = j.startX;
                        else if (j.constraint === "y") j.y = j.startY;
                    });
                }

                joints.forEach((j) => {
                    if (j.trace) {
                        j.path.push({ x: j.x, y: j.y });
                        if (j.path.length > 1000) j.path.shift();
                    } else if (j.path.length > 0) {
                        j.path = [];
                    }
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = "#2a2a40";
                ctx.lineWidth = 1;
                for (let x = 0; x < canvas.width; x += 50) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, canvas.height);
                    ctx.stroke();
                }
                for (let y = 0; y < canvas.height; y += 50) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width, y);
                    ctx.stroke();
                }

                joints.forEach((j) => {
                    if (j.constraint === "x" || j.constraint === "y") {
                        ctx.beginPath();
                        if (j.constraint === "x") {
                            ctx.moveTo(j.startX, 0);
                            ctx.lineTo(j.startX, canvas.height);
                        } else {
                            ctx.moveTo(0, j.startY);
                            ctx.lineTo(canvas.width, j.startY);
                        }
                        ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
                        ctx.lineWidth = 20;
                        ctx.stroke();
                        ctx.strokeStyle = "rgba(79, 172, 254, 0.2)";
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                });

                joints.forEach((j) => {
                    if (j.trace && j.path.length > 1) {
                        ctx.beginPath();
                        ctx.moveTo(j.path[0].x, j.path[0].y);
                        for (let i = 1; i < j.path.length; i++)
                            ctx.lineTo(j.path[i].x, j.path[i].y);
                        ctx.strokeStyle = "rgba(233, 69, 96, 0.4)";
                        ctx.lineWidth = 1.5;
                        ctx.setLineDash([4, 4]);
                        ctx.stroke();
                        ctx.setLineDash([]);
                    }
                });

                links.forEach((l) => {
                    ctx.beginPath();
                    ctx.moveTo(l.a.x, l.a.y);
                    ctx.lineTo(l.b.x, l.b.y);
                    const isSelected =
                        selectedIds.has(l.id) ||
                        (selectedIds.has(l.a.id) && selectedIds.has(l.b.id));
                    const halfSelected =
                        selectedIds.has(l.a.id) || selectedIds.has(l.b.id);
                    ctx.strokeStyle =
                        l.color || (l.isCrank ? "#f5a623" : "#4facfe");
                    if (isSelected) {
                        ctx.strokeStyle = "#00f2fe";
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = "#00f2fe";
                    } else if (halfSelected) {
                        ctx.strokeStyle = "rgba(0, 242, 254, 0.3)";
                    }
                    ctx.lineWidth = isSelected ? 10 : halfSelected ? 6 : 4;
                    ctx.lineCap = "round";
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    if (l.isCrank) {
                        ctx.beginPath();
                        ctx.arc(l.a.x, l.a.y, l.length, 0, Math.PI * 2);
                        ctx.strokeStyle = "rgba(245, 166, 35, 0.1)";
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                });

                joints.forEach((j) => {
                    ctx.beginPath();
                    const isSelected = selectedIds.has(j.id);
                    ctx.arc(j.x, j.y, isSelected ? 12 : 6, 0, Math.PI * 2);
                    if (isSelected) {
                        ctx.fillStyle = "#00f2fe";
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = "#00f2fe";
                    } else {
                        ctx.fillStyle = j.fixed ? "#444" : "#fff";
                    }
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    if (j.fixed) {
                        ctx.strokeStyle = "#fff";
                        ctx.lineWidth = isSelected ? 3 : 2;
                        ctx.stroke();
                    }
                });

                if (marqueeActive) {
                    ctx.save();
                    ctx.strokeStyle = "#fff";
                    ctx.fillStyle = "rgba(79, 172, 254, 0.3)";
                    ctx.lineWidth = 1;
                    const w = mousePos.x - marqueeStart.x;
                    const h = mousePos.y - marqueeStart.y;
                    ctx.fillRect(marqueeStart.x, marqueeStart.y, w, h);
                    ctx.setLineDash([5, 5]);
                    ctx.strokeRect(marqueeStart.x, marqueeStart.y, w, h);
                    ctx.restore();
                }

                if (tempLinkStart) {
                    ctx.beginPath();
                    ctx.moveTo(tempLinkStart.x, tempLinkStart.y);
                    ctx.lineTo(mousePos.x, mousePos.y);
                    ctx.strokeStyle = "rgba(255,255,255,0.5)";
                    ctx.setLineDash([5, 5]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            }

            let mousePos = { x: 0, y: 0 };
            let lastMousePos = { x: 0, y: 0 };

            canvas.addEventListener("mousedown", (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                lastMousePos = { x, y };

                let hitJoint = joints.find((j) => getDist(x, y, j.x, j.y) < 10);
                if (hitJoint) {
                    if (mode === "addLink") {
                        pushUndo();
                        if (!tempLinkStart) {
                            tempLinkStart = hitJoint;
                        } else {
                            if (tempLinkStart !== hitJoint) {
                                const dist = getDist(
                                    tempLinkStart.x,
                                    tempLinkStart.y,
                                    hitJoint.x,
                                    hitJoint.y,
                                );
                                links.push(
                                    new Link(tempLinkStart, hitJoint, dist),
                                );
                            }
                            tempLinkStart = null;
                            mode = "select";
                            document
                                .getElementById("addLinkBtn")
                                .classList.remove("active");
                        }
                        return;
                    }
                    draggingJoint = hitJoint;
                    selectObject("joint", hitJoint.id, e.shiftKey);
                    return;
                }

                let hitLink = links.find(
                    (l) => distToSegment({ x, y }, l.a, l.b) < 10,
                );
                if (hitLink) {
                    selectObject("link", hitLink.id, e.shiftKey);
                } else {
                    if (!e.shiftKey) selectObject(null, null);
                    marqueeActive = true;
                    marqueeStart = { x, y };
                }
            });

            function distToSegment(p, v, w) {
                const l2 = getDist(v.x, v.y, w.x, w.y) ** 2;
                if (l2 == 0) return getDist(p.x, p.y, v.x, v.y);
                let t =
                    ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) /
                    l2;
                t = Math.max(0, Math.min(1, t));
                return getDist(
                    p.x,
                    p.y,
                    v.x + t * (w.x - v.x),
                    v.y + t * (w.y - v.y),
                );
            }

            canvas.addEventListener("mousemove", (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const dx = x - lastMousePos.x;
                const dy = y - lastMousePos.y;
                mousePos.x = x;
                mousePos.y = y;

                if (draggingJoint) {
                    if (selectedIds.has(draggingJoint.id)) {
                        selectedIds.forEach((id) => {
                            const j = joints.find((jt) => jt.id === id);
                            if (j) {
                                j.x += dx;
                                j.y += dy;
                                j.startX = j.x;
                                j.startY = j.y;
                                if (j.trace) j.path = [];
                            }
                        });
                    } else {
                        draggingJoint.x = mousePos.x;
                        draggingJoint.y = mousePos.y;
                        draggingJoint.startX = mousePos.x;
                        draggingJoint.startY = mousePos.y;
                        if (draggingJoint.trace) draggingJoint.path = [];
                    }
                    if (selectedIds.has(draggingJoint.id)) {
                        document.getElementById("jointX").value =
                            draggingJoint.x.toFixed(1);
                        document.getElementById("jointY").value =
                            draggingJoint.y.toFixed(1);
                    }
                }
                lastMousePos.x = x;
                lastMousePos.y = y;
            });

            window.addEventListener("mouseup", (e) => {
                draggingJoint = null;
                if (marqueeActive) {
                    const minX = Math.min(marqueeStart.x, mousePos.x);
                    const minY = Math.min(marqueeStart.y, mousePos.y);
                    const maxX = Math.max(marqueeStart.x, mousePos.x);
                    const maxY = Math.max(marqueeStart.y, mousePos.y);
                    const margin = 8;
                    if (!e.shiftKey) selectedIds.clear();

                    const inJoints = joints.filter(
                        (j) =>
                            j.x >= minX - margin &&
                            j.x <= maxX + margin &&
                            j.y >= minY - margin &&
                            j.y <= maxY + margin,
                    );
                    inJoints.forEach((j) => selectedIds.add(j.id));

                    const inLinks = links.filter((l) => {
                        const cx = (l.a.x + l.b.x) / 2;
                        const cy = (l.a.y + l.b.y) / 2;
                        return (
                            cx >= minX - margin &&
                            cx <= maxX + margin &&
                            cy >= minY - margin &&
                            cy <= maxY + margin
                        );
                    });
                    inLinks.forEach((l) => selectedIds.add(l.id));

                    if (selectedIds.size > 0) {
                        if (inJoints.length > 0) selectedType = "joint";
                        else if (inLinks.length > 0) selectedType = "link";
                        selectObject(selectedType, null, true);
                    } else if (!e.shiftKey) {
                        selectObject(null, null);
                    }
                    marqueeActive = false;
                }
            });

            function selectObject(type, id, multi = false) {
                if (id) {
                    if (!multi && !selectedIds.has(id)) selectedIds.clear();
                    selectedType = type;
                    if (selectedIds.has(id) && multi) {
                        selectedIds.delete(id);
                        if (selectedIds.size === 0) selectedType = null;
                    } else {
                        selectedIds.add(id);
                    }
                } else if (!multi) {
                    selectedType = null;
                    selectedIds.clear();
                }

                const inspector = document.getElementById("inspector");
                const crankCtrl = document.getElementById("crankControls");
                const linkCtrl = document.getElementById("linkageControls");
                const jointCtrl = document.getElementById("jointControls");

                if (selectedIds.size === 0) {
                    inspector.style.display = "none";
                    return;
                }
                inspector.style.display = "block";

                let link = null;
                let joint = null;

                if (selectedType === "link") {
                    link = links.find((l) => selectedIds.has(l.id));
                } else {
                    joint = joints.find((j) => selectedIds.has(j.id));
                }

                if (!link && !joint) {
                    link = links.find((l) => selectedIds.has(l.id));
                    if (link) selectedType = "link";
                    else {
                        joint = joints.find((j) => selectedIds.has(j.id));
                        if (joint) selectedType = "joint";
                    }
                }

                if (!link && !joint) {
                    inspector.style.display = "none";
                    return;
                }

                inspector.style.display = "block";

                if (link) {
                    document.getElementById("inspectTitle").textContent =
                        link.isCrank ? "Crank Inspector" : "Linkage Inspector";
                    crankCtrl.style.display = link.isCrank ? "block" : "none";
                    linkCtrl.style.display = !link.isCrank ? "block" : "none";
                    jointCtrl.style.display = "none";
                    if (link.isCrank) {
                        const rpm = link.rpm;
                        const len = link.length / CM_TO_PX;
                        document.getElementById("crankRPM").value = rpm;
                        document.getElementById("crankRPMNum").value =
                            rpm.toFixed(1);
                        document.getElementById("crankLen").value = len;
                        document.getElementById("crankLenNum").value =
                            len.toFixed(1);

                        const deg =
                            ((link.angle * 180) / Math.PI + 360) % 360;
                        document.getElementById("crankAngle").value =
                            deg.toFixed(0);
                        document.getElementById("crankAngleNum").value =
                            deg.toFixed(0);
                    } else {
                        const len = link.length / CM_TO_PX;
                        document.getElementById("linkLen").value = len;
                        document.getElementById("linkLenNum").value =
                            len.toFixed(1);
                    }
                } else if (joint) {
                    document.getElementById("inspectTitle").textContent =
                        "Joint Inspector";
                    crankCtrl.style.display = "none";
                    linkCtrl.style.display = "none";
                    jointCtrl.style.display = "block";
                    document.getElementById("jointX").value =
                        joint.x.toFixed(1);
                    document.getElementById("jointY").value =
                        joint.y.toFixed(1);
                    document.getElementById("jointFixed").checked = joint.fixed;
                    document.getElementById("jointTrace").checked = joint.trace;
                    document.getElementById("jointConstraint").value =
                        joint.constraint;
                }
            }

            document
                .getElementById("addCrankBtn")
                .addEventListener("click", () => {
                    pushUndo();
                    const cx = canvas.width / 2 + (Math.random() - 0.5) * 100;
                    const cy = canvas.height / 2 + (Math.random() - 0.5) * 100;
                    const j1 = new Joint(cx, cy, true);
                    const j2 = new Joint(cx + 50 * CM_TO_PX, cy, false);
                    joints.push(j1, j2);
                    links.push(new Link(j1, j2, 50 * CM_TO_PX, true));
                });

            document
                .getElementById("addJointBtn")
                .addEventListener("click", () => {
                    pushUndo();
                    const cx = canvas.width / 2 + (Math.random() - 0.5) * 100;
                    const cy = canvas.height / 2 + (Math.random() - 0.5) * 100;
                    const j = new Joint(cx, cy, false);
                    joints.push(j);
                    selectObject("joint", j.id);

            document
                .getElementById("addLinkBtn")
                .addEventListener("click", (e) => {
                    mode = "addLink";
                    e.target.classList.add("active");
                    tempLinkStart = null;
                });

            document
                .getElementById("jansenBtn")
                .addEventListener("click", () => {
                    pushUndo();
                    const s = 5;
                    const cx = canvas.width / 2;
                    const cy = canvas.height / 2;
                    const O = new Joint(cx - 50, cy - 50, true);
                    const M = new Joint(O.x + 38 * s, O.y + 7.8 * s, true);
                    const C = new Joint(M.x + 15 * s, M.y, false);
                    const p1 = intersectCircles(
                        O.x,
                        O.y,
                        41.5 * s,
                        C.x,
                        C.y,
                        50 * s,
                        1,
                    );
                    const j1 = new Joint(p1.x, p1.y, false);
                    const p2 = intersectCircles(
                        O.x,
                        O.y,
                        39.3 * s,
                        C.x,
                        C.y,
                        61.9 * s,
                        -1,
                    );
                    const j2 = new Joint(p2.x, p2.y, false);
                    const p3 = intersectCircles(
                        O.x,
                        O.y,
                        40.1 * s,
                        j1.x,
                        j1.y,
                        55.8 * s,
                        -1,
                    );
                    const j3 = new Joint(p3.x, p3.y, false);
                    const p5 = intersectCircles(
                        j2.x,
                        j2.y,
                        49 * s,
                        j3.x,
                        j3.y,
                        36.7 * s,
                        1,
                    );
                    const j5 = new Joint(p5.x, p5.y, false);
                    const p4 = intersectCircles(
                        j3.x,
                        j3.y,
                        39.4 * s,
                        j5.x,
                        j5.y,
                        65.7 * s,
                        -1,
                    );
                    const j4 = new Joint(p4.x, p4.y, false);
                    joints.push(O, M, C, j1, j2, j3, j4, j5);
                    const crank = new Link(M, C, 15 * s, true);
                    crank.rpm = 30;
                    links.push(crank);
                    links.push(new Link(O, j1, 41.5 * s));
                    links.push(new Link(C, j1, 50 * s));
                    links.push(new Link(O, j2, 39.3 * s));
                    links.push(new Link(C, j2, 61.9 * s));
                    links.push(new Link(O, j3, 40.1 * s));
                    links.push(new Link(j1, j3, 55.8 * s));
                    links.push(new Link(j2, j5, 49 * s));
                    links.push(new Link(j3, j5, 36.7 * s));
                    links.push(new Link(j3, j4, 39.4 * s));
                    links.push(new Link(j5, j4, 65.7 * s));
                    j4.trace = true;
                    selectObject("link", crank.id);
                });

            function getSelectionBounds() {
                let minX = Infinity,
                    minY = Infinity,
                    maxX = -Infinity,
                    maxY = -Infinity;
                let selectionJoints = new Set();
                let selectionLinks = new Set();
                joints.forEach((j) => {
                    if (selectedIds.has(j.id)) selectionJoints.add(j);
                });
                links.forEach((l) => {
                    if (selectedIds.has(l.id)) selectionLinks.add(l);
                    if (selectedIds.has(l.a.id) && selectedIds.has(l.b.id))
                        selectionLinks.add(l);
                });
                selectionLinks.forEach((l) => {
                    selectionJoints.add(l.a);
                    selectionJoints.add(l.b);
                });
                if (selectionJoints.size === 0) return null;
                selectionJoints.forEach((j) => {
                    minX = Math.min(minX, j.x);
                    minY = Math.min(minY, j.y);
                    maxX = Math.max(maxX, j.x);
                    maxY = Math.max(maxY, j.y);
                });
                return {
                    minX,
                    minY,
                    maxX,
                    maxY,
                    centerX: (minX + maxX) / 2,
                    centerY: (minY + maxY) / 2,
                    selectionJoints,
                };
            }

            function copySelection() {
                const bounds = getSelectionBounds();
                if (!bounds) return;
                const jointMap = new Map();
                const copyJoints = [];
                bounds.selectionJoints.forEach((j) => {
                    const nj = {
                        ...j,
                        id: Math.random().toString(36).substr(2, 9),
                        relX: j.x - bounds.centerX,
                        relY: j.y - bounds.centerY,
                    };
                    jointMap.set(j.id, nj.id);
                    copyJoints.push(nj);
                });
                const copyLinks = links
                    .filter((l) => {
                        if (selectedIds.has(l.id)) return true;
                        return (
                            bounds.selectionJoints.has(l.a) &&
                            bounds.selectionJoints.has(l.b)
                        );
                    })
                    .map((l) => ({
                        ...l,
                        id: Math.random().toString(36).substr(2, 9),
                        aId: jointMap.get(l.a.id),
                        bId: jointMap.get(l.b.id),
                    }));
                clipboard = { joints: copyJoints, links: copyLinks };
            }

            function pasteSelection() {
                if (!clipboard) return;
                pushUndo();
                const idMap = new Map();
                const newJoints = clipboard.joints.map((cj) => {
                    const nj = new Joint(
                        mousePos.x + cj.relX,
                        mousePos.y + cj.relY,
                        cj.fixed,
                    );
                    nj.id = Math.random().toString(36).substr(2, 9);
                    nj.constraint = cj.constraint || "none";
                    nj.startX = nj.x;
                    nj.startY = nj.y;
                    nj.trace = cj.trace;
                    idMap.set(cj.id, nj.id);
                    return nj;
                });
                const newLinks = clipboard.links.map((cl) => {
                    const ja = newJoints.find(
                        (nj) => nj.id === idMap.get(cl.aId),
                    );
                    const jb = newJoints.find(
                        (nj) => nj.id === idMap.get(cl.bId),
                    );
                    const nl = new Link(ja, jb, cl.length, cl.isCrank);
                    nl.rpm = cl.rpm;
                    nl.angle = cl.angle;
                    if (cl.color) nl.color = cl.color;
                    return nl;
                });
                joints.push(...newJoints);
                links.push(...newLinks);
                selectedIds.clear();
                if (newLinks.length > 0) {
                    newLinks.forEach((l) => selectedIds.add(l.id));
                    selectObject("link", newLinks[0].id, true);
                } else if (newJoints.length > 0) {
                    newJoints.forEach((j) => selectedIds.add(j.id));
                    selectObject("joint", newJoints[0].id, true);
                }
            }

            document
                .getElementById("copyBtn")
                .addEventListener("click", copySelection);
            document
                .getElementById("pasteBtn")
                .addEventListener("click", pasteSelection);
            document
                .getElementById("mirrorHBtn")
                .addEventListener("click", () => {
                    const bounds = getSelectionBounds();
                    if (!bounds) return;
                    pushUndo();
                    bounds.selectionJoints.forEach((j) => {
                        j.x = bounds.centerX - (j.x - bounds.centerX);
                        j.startX = j.x;
                        j.path = [];
                    });
                    links.forEach((l) => {
                        if (bounds.selectionJoints.has(l.a) && l.isCrank)
                            l.angle = Math.atan2(l.b.y - l.a.y, l.b.x - l.a.x);
                    });
                });
            document
                .getElementById("mirrorVBtn")
                .addEventListener("click", () => {
                    const bounds = getSelectionBounds();
                    if (!bounds) return;
                    pushUndo();
                    bounds.selectionJoints.forEach((j) => {
                        j.y = bounds.centerY - (j.y - bounds.centerY);
                        j.startY = j.y;
                        j.path = [];
                    });
                    links.forEach((l) => {
                        if (bounds.selectionJoints.has(l.a) && l.isCrank)
                            l.angle = Math.atan2(l.b.y - l.a.y, l.b.x - l.a.x);
                    });
                });

            function rotateSelection(angle) {
                const bounds = getSelectionBounds();
                if (!bounds) return;
                pushUndo();
                const cos = Math.cos(angle);
                const sin = Math.sin(angle);
                bounds.selectionJoints.forEach((j) => {
                    const dx = j.x - bounds.centerX;
                    const dy = j.y - bounds.centerY;
                    j.x = bounds.centerX + dx * cos - dy * sin;
                    j.y = bounds.centerY + dx * sin + dy * cos;
                    j.startX = j.x;
                    j.startY = j.y;
                    j.path = [];
                });
                links.forEach((l) => {
                    if (bounds.selectionJoints.has(l.a) && l.isCrank)
                        l.angle += angle;
                });
            }

            document
                .getElementById("rotateLBtn")
                .addEventListener("click", () =>
                    rotateSelection(-Math.PI / 180),
                );
            document
                .getElementById("rotateRBtn")
                .addEventListener("click", () =>
                    rotateSelection(Math.PI / 180),
                );

            let colorUndoPushed = false;
            document
                .getElementById("linkColorPicker")
                .addEventListener("input", (e) => {
                    const newColor = e.target.value;
                    links.forEach((l) => {
                        if (selectedIds.has(l.id)) {
                            if (!colorUndoPushed) {
                                pushUndo();
                                colorUndoPushed = true;
                            }
                            l.color = newColor;
                        }
                    });
                });
            document
                .getElementById("linkColorPicker")
                .addEventListener("change", () => {
                    colorUndoPushed = false;
                });

            document
                .getElementById("exportBtn")
                .addEventListener("click", () => {
                    const state = {
                        joints: joints.map((j) => ({
                            x: j.x,
                            y: j.y,
                            fixed: j.fixed,
                            constraint: j.constraint,
                            startX: j.startX,
                            startY: j.startY,
                            trace: j.trace,
                            id: j.id,
                        })),
                        links: links.map((l) => ({
                            aId: l.a.id,
                            bId: l.b.id,
                            length: l.length,
                            isCrank: l.isCrank,
                            rpm: l.rpm,
                            angle: l.angle,
                            color: l.color,
                            id: l.id,
                        })),
                    };
                    const blob = new Blob([JSON.stringify(state, null, 2)], {
                        type: "application/json",
                    });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = "mechanism.json";
                    a.click();
                    URL.revokeObjectURL(url);
                });

            document
                .getElementById("importBtn")
                .addEventListener("click", () => {
                    const input = document.createElement("input");
                    input.type = "file";
                    input.accept = ".json";
                    input.onchange = (e) => {
                        const file = e.target.files[0];
                        if (!file) return;
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            try {
                                const state = JSON.parse(e.target.result);
                                pushUndo();
                                joints = state.joints.map((sj) => {
                                    const j = new Joint(sj.x, sj.y, sj.fixed);
                                    j.id = sj.id;
                                    j.constraint = sj.constraint || "none";
                                    j.startX = sj.startX ?? sj.x;
                                    j.startY = sj.startY ?? sj.y;
                                    j.trace = sj.trace;
                                    return j;
                                });
                                links = state.links
                                    .map((sl) => {
                                        const ja = joints.find(
                                            (j) => j.id === sl.aId,
                                        );
                                        const jb = joints.find(
                                            (j) => j.id === sl.bId,
                                        );
                                        if (!ja || !jb) return null;
                                        const l = new Link(
                                            ja,
                                            jb,
                                            sl.length,
                                            sl.isCrank,
                                        );
                                        l.rpm = sl.rpm;
                                        l.angle = sl.angle;
                                        if (sl.color) l.color = sl.color;
                                        l.id = sl.id;
                                        return l;
                                    })
                                    .filter((l) => l !== null);
                                selectedIds.clear();
                                selectObject(null, null);
                            } catch (err) {
                                alert("Failed to load file: " + err.message);
                            }
                        };
                        reader.readAsText(file);
                    };
                    input.click();
                });

            document.getElementById("undoBtn").addEventListener("click", undo);

            document
                .getElementById("playPauseBtn")
                .addEventListener("click", () => {
                    isPaused = !isPaused;
                    document.getElementById("playIcon").style.display = isPaused
                        ? "inline"
                        : "none";
                    document.getElementById("pauseIcon").style.display =
                        isPaused ? "none" : "inline";
                });

            document.getElementById("saveBtn").addEventListener("click", () => {
                saveState();
                alert("State saved! Crank speeds set to 0 in save.");
            });
            document
                .getElementById("clearTracesBtn")
                .addEventListener("click", () =>
                    joints.forEach((j) => (j.path = [])),
                );
            document
                .getElementById("clearBtn")
                .addEventListener("click", () => {
                    pushUndo();
                    joints = [];
                    links = [];
                    selectObject(null, null);
                });

            function syncRangeNum(rangeId, numId, callback) {
                const range = document.getElementById(rangeId);
                const num = document.getElementById(numId);
                range.addEventListener("input", (e) => {
                    num.value = parseFloat(e.target.value).toFixed(1);
                    callback(parseFloat(e.target.value));
                });
                num.addEventListener("input", (e) => {
                    range.value = e.target.value;
                    callback(parseFloat(e.target.value));
                });
            }

            syncRangeNum("crankRPM", "crankRPMNum", (val) => {
                selectedIds.forEach((id) => {
                    const l = links.find((li) => li.id === id);
                    if (l && l.isCrank) l.rpm = val;
                });
            });

            document.getElementById("crankStop").addEventListener("click", () => {
                selectedIds.forEach((id) => {
                    const l = links.find((li) => li.id === id);
                    if (l && l.isCrank) {
                        l.rpm = 0;
                        document.getElementById("crankRPM").value = 0;
                        document.getElementById("crankRPMNum").value = "0.0";
                    }
                });
            });

            document.getElementById("crankCW").addEventListener("click", () => {
                selectedIds.forEach((id) => {
                    const l = links.find((li) => li.id === id);
                    if (l && l.isCrank) {
                        l.rpm = 30;
                        document.getElementById("crankRPM").value = 30;
                        document.getElementById("crankRPMNum").value = "30.0";
                    }
                });
            });

            document.getElementById("crankCCW").addEventListener("click", () => {
                selectedIds.forEach((id) => {
                    const l = links.find((li) => li.id === id);
                    if (l && l.isCrank) {
                        l.rpm = -30;
                        document.getElementById("crankRPM").value = -30;
                        document.getElementById("crankRPMNum").value = "-30.0";
                    }
                });
            });

            syncRangeNum("crankAngle", "crankAngleNum", (val) => {
                selectedIds.forEach((id) => {
                    const l = links.find((li) => li.id === id);
                    if (l && l.isCrank) {
                        l.angle = (val * Math.PI) / 180;
                    }
                });
            });

            syncRangeNum("crankLen", "crankLenNum", (val) => {
                selectedIds.forEach((id) => {
                    const l = links.find((li) => li.id === id);
                    if (l && l.isCrank) l.length = val * CM_TO_PX;
                });
            });

            syncRangeNum("linkLen", "linkLenNum", (val) => {
                selectedIds.forEach((id) => {
                    const l = links.find((li) => li.id === id);
                    if (l && !l.isCrank) l.length = val * CM_TO_PX;
                });
            });

            document.getElementById("jointX").addEventListener("input", (e) => {
                const val = parseFloat(e.target.value);
                if (isNaN(val)) return;
                selectedIds.forEach((id) => {
                    const j = joints.find((jt) => jt.id === id);
                    if (j) {
                        j.x = val;
                        j.startX = j.x;
                    }
                });
            });

            document.getElementById("jointY").addEventListener("input", (e) => {
                const val = parseFloat(e.target.value);
                if (isNaN(val)) return;
                selectedIds.forEach((id) => {
                    const j = joints.find((jt) => jt.id === id);
                    if (j) {
                        j.y = val;
                        j.startY = j.y;
                    }
                });
            });
            document
                .getElementById("jointFixed")
                .addEventListener("change", (e) => {
                    selectedIds.forEach((id) => {
                        const j = joints.find((jt) => jt.id === id);
                        if (j) j.fixed = e.target.checked;
                    });
                });
            document
                .getElementById("jointTrace")
                .addEventListener("change", (e) => {
                    selectedIds.forEach((id) => {
                        const j = joints.find((jt) => jt.id === id);
                        if (j) {
                            j.trace = e.target.checked;
                            if (!j.trace) j.path = [];
                        }
                    });
                });
            document
                .getElementById("jointConstraint")
                .addEventListener("change", (e) => {
                    selectedIds.forEach((id) => {
                        const j = joints.find((jt) => jt.id === id);
                        if (j) {
                            j.constraint = e.target.value;
                            j.startX = j.x;
                            j.startY = j.y;
                        }
                    });
                });

            function deleteSelection() {
                if (selectedIds.size === 0) return;
                pushUndo();
                const toDelete = new Set(selectedIds);
                links = links.filter(
                    (l) =>
                        !toDelete.has(l.id) &&
                        !toDelete.has(l.a.id) &&
                        !toDelete.has(l.b.id),
                );
                joints = joints.filter((j) => !toDelete.has(j.id));
                selectObject(null, null);
            }
            document
                .getElementById("deleteBtn")
                .addEventListener("click", deleteSelection);

            function loop() {
                update();
                draw();
                requestAnimationFrame(loop);
            }
            window.addEventListener("resize", () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });

            function selectAll() {
                if (joints.length > 0) {
                    selectedIds.clear();
                    joints.forEach((j) => selectedIds.add(j.id));
                    selectedType = "joint";
                    selectObject("joint", null, true);
                }
            }

            function moveSelection(dx, dy) {
                const bounds = getSelectionBounds();
                if (!bounds) return;
                bounds.selectionJoints.forEach((j) => {
                    j.x += dx;
                    j.y += dy;
                    j.startX = j.x;
                    j.startY = j.y;
                    if (j.trace) j.path = [];
                });
                links.forEach((l) => {
                    if (
                        l.isCrank &&
                        bounds.selectionJoints.has(l.a) &&
                        !bounds.selectionJoints.has(l.b)
                    )
                        l.angle = Math.atan2(l.b.y - l.a.y, l.b.x - l.a.x);
                });
                const sj = joints.find((j) => selectedIds.has(j.id));
                if (sj) {
                    document.getElementById("jointX").value = sj.x.toFixed(1);
                    document.getElementById("jointY").value = sj.y.toFixed(1);
                }
            }

            window.addEventListener("keydown", (e) => {
                if (e.target.tagName === "INPUT") return;
                if (e.ctrlKey || e.metaKey) {
                    if (e.key === "c" || e.key === "C") {
                        copySelection();
                        e.preventDefault();
                    } else if (e.key === "v" || e.key === "V") {
                        pasteSelection();
                        e.preventDefault();
                    } else if (e.key === "a" || e.key === "A") {
                        selectAll();
                        e.preventDefault();
                    } else if (e.key === "z" || e.key === "Z") {
                        undo();
                        e.preventDefault();
                    }
                } else if (e.key === "Delete" || e.key === "Backspace") {
                    deleteSelection();
                } else if (e.key === "ArrowUp") {
                    if (!moveUndoPushed) {
                        pushUndo();
                        moveUndoPushed = true;
                    }
                    moveSelection(0, -5);
                    e.preventDefault();
                } else if (e.key === "ArrowDown") {
                    if (!moveUndoPushed) {
                        pushUndo();
                        moveUndoPushed = true;
                    }
                    moveSelection(0, 5);
                    e.preventDefault();
                } else if (e.key === "ArrowLeft") {
                    if (!moveUndoPushed) {
                        pushUndo();
                        moveUndoPushed = true;
                    }
                    moveSelection(-5, 0);
                    e.preventDefault();
                } else if (e.key === "ArrowRight") {
                    if (!moveUndoPushed) {
                        pushUndo();
                        moveUndoPushed = true;
                    }
                    moveSelection(5, 0);
                    e.preventDefault();
                }
            });

            window.addEventListener("keyup", (e) => {
                if (
                    [
                        "ArrowUp",
                        "ArrowDown",
                        "ArrowLeft",
                        "ArrowRight",
                    ].includes(e.key)
                )
                    moveUndoPushed = false;
            });

            init();
            loop();
        </script>
    </body>
</html>
